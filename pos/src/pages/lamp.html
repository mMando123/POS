<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجاوب بالكامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #d4af37;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #121417;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            /* منع التمرير الأفقي */
        }

        /* === الحاوية الرئيسية (السر في التجاوب) === */
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 120px;
            /* المسافة بين المصباح والنموذج */
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        /* === المصباح === */
        .lamp-container {
            position: relative;
            /* تم إلغاء absolute ليتجاوب طبيعيا */
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            user-select: none;
            -webkit-user-select: none;
            margin-top: -100px;
            /* لرفع المصباح قليلا ليوازن الشكل */
        }

        .lamp-head {
            width: 140px;
            height: 60px;
            background-color: #e0e0e0;
            border-radius: 70px 70px 10px 10px;
            position: relative;
            z-index: 2;
            transition: all 0.4s ease;
        }

        body[data-on="true"] .lamp-head {
            background-color: #fffde7;
            box-shadow:
                0 20px 40px 10px rgba(255, 235, 150, 0.8),
                0 40px 80px 20px rgba(255, 220, 100, 0.5),
                0 60px 150px 40px rgba(255, 200, 50, 0.3);
        }

        .lamp-stand {
            width: 8px;
            height: 150px;
            background-color: #888;
            margin-top: -5px;
        }

        .lamp-cord-wrapper {
            position: absolute;
            top: 60px;
            right: 40px;
            z-index: 1;
        }

        #cord-svg {
            position: absolute;
            top: 0;
            left: -50px;
            overflow: visible;
            pointer-events: none;
        }

        #cord-path {
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #cord-ball {
            filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.8));
        }

        /* === نموذج تسجيل الدخول === */
        .login-form {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            /* استخدام عرض 100% مع حد أقصى للتجاوب مع الهواتف */
            width: 100%;
            max-width: 360px;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            color: #fff;
        }

        .login-form.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 235, 150, 0.1);
        }

        .login-form h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: border 0.3s;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: var(--primary-gold);
        }

        .input-group input[type="password"] {
            direction: ltr;
            text-align: right;
        }

        .login-form button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--primary-gold), #f3e5ab);
            border: none;
            border-radius: 8px;
            color: #121417;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, opacity 0.2s;
            font-family: inherit;
        }

        .login-form button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* === إعدادات التجاوب (Media Queries) === */
        /* الشاشات المتوسطة والصغيرة (التابلت والهواتف) */
        @media (max-width: 850px) {
            .main-wrapper {
                flex-direction: column;
                /* تحويل العرض من أفقي إلى رأسي */
                gap: 50px;
                /* تقليل المسافة بين المصباح والنموذج */
                padding: 40px 20px;
            }

            .lamp-container {
                margin-top: 0;
            }

            /* تعديل طفيف للمصباح ليناسب الهواتف */
            .lamp-head {
                width: 120px;
                height: 50px;
            }

            .lamp-cord-wrapper {
                top: 50px;
                right: 35px;
            }
        }

        /* الهواتف الصغيرة جداً */
        @media (max-width: 400px) {
            .login-form {
                padding: 30px 20px;
                /* تقليل الحواف الداخلية لزيادة المساحة */
            }
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <div class="lamp-container" id="lampContainer">
            <div class="lamp-head"></div>
            <div class="lamp-cord-wrapper">
                <svg id="cord-svg" width="100" height="150" viewBox="0 0 100 150">
                    <path id="cord-path" d="" stroke="#ccc" stroke-width="2" fill="none" />
                    <circle id="cord-ball" r="6" fill="var(--primary-gold)" />
                </svg>
            </div>
            <div class="lamp-stand"></div>
        </div>

        <div id="loginForm" class="login-form">
            <h2>مرحباً بك</h2>
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" placeholder="أدخل اسمك هنا">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button>تسجيل الدخول</button>
        </div>
    </div>

    <script>
        // كود الجافاسكريبت الخاص بالحركة والتموج الفائق دون تغيير
        let isOn = false;
        const loginForm = document.getElementById("loginForm");
        const body = document.body;
        const lampContainer = document.getElementById("lampContainer");

        const cordPath = document.getElementById("cord-path");
        const cordBall = document.getElementById("cord-ball");

        const totalPoints = 10;
        const cordLength = 90;
        const baseX = 50;
        const baseY = 0;

        let points = [];
        for (let i = 0; i < totalPoints; i++) {
            points.push({
                x: baseX,
                y: baseY + (i * (cordLength / (totalPoints - 1))),
                baseY: baseY + (i * (cordLength / (totalPoints - 1)))
            });
        }

        function renderCord() {
            let d = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < totalPoints - 1; i++) {
                const xc = (points[i].x + points[i + 1].x) / 2;
                const yc = (points[i].y + points[i + 1].y) / 2;
                d += ` Q ${points[i].x} ${points[i].y}, ${xc} ${yc}`;
            }
            const lastPoint = points[totalPoints - 1];
            d += ` L ${lastPoint.x} ${lastPoint.y}`;

            cordPath.setAttribute("d", d);
            cordBall.setAttribute("cx", lastPoint.x);
            cordBall.setAttribute("cy", lastPoint.y);
        }

        points.forEach((point, index) => {
            if (index === 0) return;
            const range = (index / totalPoints) * 20;
            gsap.to(point, {
                x: baseX - (range / 2) + Math.random() * range,
                x: baseX + 15 * (index / totalPoints),
                duration: 1.5,
                ease: "sine.inOut",
                yoyo: true,
                repeat: -1,
                delay: index * 0.08,
                onUpdate: renderCord
            });
        });

        function stretchCord(targetY) {
            points.forEach((point, index) => {
                if (index === 0) return;
                const factor = index / totalPoints;
                gsap.to(point, {
                    y: point.baseY + (targetY - point.baseY) * factor,
                    duration: 0.2,
                    ease: "power2.out",
                    onUpdate: renderCord
                });
            });
        }

        lampContainer.addEventListener("mousedown", () => stretchCord(120));
        lampContainer.addEventListener("touchstart", (e) => stretchCord(120), { passive: true });

        function releaseCord() {
            points.forEach((point, index) => {
                if (index === 0) return;
                gsap.to(point, {
                    y: point.baseY,
                    duration: 0.8,
                    ease: "elastic.out(1.2, 0.3)",
                    delay: (index / totalPoints) * 0.1,
                    onUpdate: renderCord
                });
            });

            isOn = !isOn;
            body.setAttribute("data-on", isOn);
            if (isOn) {
                loginForm.classList.add("active");
                gsap.to(body, { backgroundColor: "#1e2126", duration: 0.6 });
            } else {
                loginForm.classList.remove("active");
                gsap.to(body, { backgroundColor: "#121417", duration: 0.6 });
            }
        }

        lampContainer.addEventListener("mouseup", releaseCord);
        lampContainer.addEventListener("touchend", releaseCord);

        lampContainer.addEventListener("mouseleave", () => {
            points.forEach((point, index) => {
                if (index === 0) return;
                gsap.to(point, {
                    y: point.baseY,
                    duration: 0.8,
                    ease: "elastic.out(1.2, 0.3)",
                    onUpdate: renderCord
                });
            });
        });

        renderCord();
    </script>
</body>

</html>
