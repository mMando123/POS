events {
    worker_connections 1024;
}

http {
    # Upstream definitions
    upstream backend_api {
        server backend:3001;
    }
    upstream pos_app {
        server pos:80;
    }
    upstream website_app {
        server website:80;
    }
    upstream kds_app {
        server kds:80;
    }

    # Main entry - routes by subdomain or path
    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 20M;

        # POS at root (default)
        location / {
            proxy_pass http://pos_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Socket.IO
        location /socket.io/ {
            proxy_pass http://backend_api/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # Uploads
        location /uploads/ {
            proxy_pass http://backend_api/uploads/;
            proxy_set_header Host $host;
        }

        # Website at /menu path
        location /menu {
            proxy_pass http://website_app;
            proxy_set_header Host $host;
        }

        # KDS at /kitchen path
        location /kitchen {
            proxy_pass http://kds_app;
            proxy_set_header Host $host;
        }
    }
}
