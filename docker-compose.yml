version: '3.8'

services:
  # ============ MySQL Database ============
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Zimam2026!}
      MYSQL_DATABASE: ${DB_NAME:-pos_restaurant}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-Zimam2026!}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ============ Backend API ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_DIALECT: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-pos_restaurant}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-Zimam2026!}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string-in-production}
      JWT_EXPIRES_IN: 12h
      REFRESH_TOKEN_EXPIRES_DAYS: 7
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:80,http://localhost:8080,http://localhost:3000,http://localhost:3002,http://localhost:3003}
      ACCOUNTING_STRICT_DEFAULTS: "true"
      ACCOUNTING_AUTO_REMAP_POSTING: "false"
      ACCOUNTING_ALLOW_GLOBAL_FALLBACK: "false"
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3001/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
      - backend_logs:/app/logs
      - backend_backups:/app/backups

  # ============ POS Frontend (Cashier) ============
  pos:
    build:
      context: ./pos
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${POS_API_URL:-/api}
        VITE_SOCKET_URL: ${POS_SOCKET_URL:-}
    restart: always
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy

  # ============ Website (Customer Ordering) ============
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${WEBSITE_API_URL:-/api}
        VITE_SOCKET_URL: ${WEBSITE_SOCKET_URL:-}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # ============ KDS (Kitchen Display) ============
  kds:
    build:
      context: ./kds
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${KDS_API_URL:-/api}
        VITE_SOCKET_URL: ${KDS_SOCKET_URL:-}
    restart: always
    ports:
      - "3003:80"
    depends_on:
      backend:
        condition: service_healthy

  # ============ Nginx Reverse Proxy ============
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      pos:
        condition: service_started
      website:
        condition: service_started
      kds:
        condition: service_started

volumes:
  mysql_data:
  backend_uploads:
  backend_data:
  backend_logs:
  backend_backups:
